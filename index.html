<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #FDF5E6;
}

/* 🧧 CORNER FLORAL (VISIBLE) */
.corner {
  position: fixed;
  width: 70px;
  z-index: 5;
}
.top-left { top: 0; left: 0; }
.top-right { top: 0; right: 0; transform: rotate(90deg); }
.bottom-left { bottom: 0; left: 0; transform: rotate(-90deg); }
.bottom-right { bottom: 0; right: 0; transform: rotate(180deg); }

/* 🕉️ GANESHA FIXED */
.ganesha {
  position: fixed;
  top: 12px;
  left: 12px;
  width: 45px;
  z-index: 10;
}

/* HERO */
.video-bg {
  height: 100vh;
  position: relative;
}
.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

/* NAME */
.name {
  font-family: 'Playfair Display';
  font-size: clamp(2.5rem,6vw,5rem);
  color: white;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1.5s forwards;
}
.name span {
  color: #D4AF37;
  animation: glow 2s forwards;
  animation-delay: 1s;
}
@keyframes fadeUp {
  to {opacity:1; transform:translateY(0);}
}
@keyframes glow {
  to {text-shadow: 0 0 15px rgba(212,175,55,0.7);}
}

/* ✍️ INVITE LINE FIXED */
.invite-line {
  font-family: 'Cormorant Garamond', serif;
  color: #f3e3a2;
  font-size: 1.1rem;
  margin-top: 10px;
}

/* ⏱️ COUNTDOWN (RESTORED PREMIUM) */
.count-box {
  color: white;
  text-align: center;
  padding: 8px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
}
.count-box span {
  font-size: 1.5rem;
  display: block;
  text-shadow: 0 0 10px rgba(212,175,55,0.7);
}

/* 📸 MEMORY FIXED */
.slider {
  max-width: 360px;
  height: 240px;
  margin: auto;
  position: relative;
}
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 1s ease;
}
.slide.active {
  opacity: 1;
}

/* 🗺️ MAP FIXED */
.map-card {
  max-width: 360px;
  margin: auto;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #ddd;
  background: white;
}
.map-card img {
  width: 100%;
  height: auto;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #D4AF37;
  color: white;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🧧 CORNERS (SVG floral) -->
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Floral_corner_gold.svg" class="corner top-left">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Floral_corner_gold.svg" class="corner top-right">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Floral_corner_gold.svg" class="corner bottom-left">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Floral_corner_gold.svg" class="corner bottom-right">

<!-- 🕉️ GANESHA -->
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Ganesha_simple_icon.png" class="ganesha">

<!-- HERO -->
<section class="video-bg">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>

  <div class="overlay"></div>

  <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4">
    
    <h1 class="name">
      Nirbhay <span>&</span> Partner
    </h1>

    <p class="invite-line">
      Together with their families, request the pleasure of your presence
    </p>

    <div class="flex gap-3 mt-6" id="countdown"></div>
  </div>
</section>

<!-- MEMORY -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-[Playfair_Display] text-[#D4AF37] mb-6">
    Our Journey Continues
  </h2>

  <div class="slider">
    <img src="https://picsum.photos/600/400?1" class="slide active">
    <img src="https://picsum.photos/600/400?2" class="slide">
    <img src="https://picsum.photos/600/400?3" class="slide">
  </div>
</section>

<!-- MAP -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-[Playfair_Display] mb-4">Venue</h2>
  <p class="mb-4">Grand Palace, Lucknow</p>

  <div class="map-card">
    <a href="https://maps.google.com?q=Lucknow" target="_blank">
      <img src="https://maps.googleapis.com/maps/api/staticmap?center=Lucknow&zoom=14&size=600x300&markers=color:gold|Lucknow">
    </a>
  </div>

  <p class="text-sm mt-3 text-gray-500">Tap to open in Google Maps</p>
</section>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// COUNTDOWN
const target = new Date("Nov 30, 2026").getTime();
setInterval(()=>{
  let now = new Date().getTime();
  let diff = target - now;

  let d = Math.floor(diff/(1000*60*60*24));
  let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((diff%(1000*60*60))/(1000*60));
  let s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML = `
    <div class="count-box"><span>${d}</span>Days</div>
    <div class="count-box"><span>${h}</span>Hours</div>
    <div class="count-box"><span>${m}</span>Minutes</div>
    <div class="count-box"><span>${s}</span>Seconds</div>
  `;
},1000);

// SLIDER
let i=0;
const slides=document.querySelectorAll(".slide");
setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
  i=(i+1)%slides.length;
},3000);

// MUSIC
const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

btn.onclick=()=>{
  if(music.paused){
    music.play();
    btn.innerText="⏸";
  } else {
    music.pause();
    btn.innerText="🎵";
  }
};
</script>

</body>
</html>
