<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #FDF5E6;
  overflow-x: hidden;
}

/* GOLD BORDER */
.border-frame {
  border: 10px solid transparent;
  padding: 10px;
  background: linear-gradient(#FDF5E6, #FDF5E6) padding-box,
              linear-gradient(45deg, #D4AF37, #fff2c2, #D4AF37) border-box;
}

/* ENVELOPE */
.envelope {
  position: fixed;
  inset: 0;
  background: #FDF5E6;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.flap {
  width: 250px;
  height: 150px;
  background: #D4AF37;
  position: relative;
  cursor: pointer;
  transform-origin: top;
  transition: transform 1s ease;
}

.flap::before {
  content: "";
  position: absolute;
  width: 250px;
  height: 150px;
  background: #c9a52f;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}

.open {
  transform: rotateX(180deg);
}

/* CINEMATIC INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  letter-spacing: 3px;
  opacity: 0;
  z-index: 9998;
}

/* VIDEO HERO */
.video-bg {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.video-bg video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

/* PARALLAX */
.parallax {
  transform: translateZ(0);
  transition: transform 0.2s;
}

/* NAME */
.name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  color: white;
}

.glow {
  color: #D4AF37;
  text-shadow: 0 0 25px rgba(212,175,55,0.8);
}

/* SLIDER */
.slider img {
  width: 100%;
  border-radius: 12px;
  position: absolute;
  opacity: 0;
  transition: 1s;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #D4AF37;
  color: white;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope" id="envelope">
  <div class="flap" onclick="openInvite()"></div>
</div>

<!-- INTRO -->
<div class="intro" id="intro">
  A LOVE STORY BEGINS
</div>

<!-- MAIN CONTENT -->
<div id="main" class="hidden">

<div class="border-frame">

<!-- HERO -->
<section class="video-bg parallax">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>

  <div class="overlay"></div>

  <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
    <h1 class="name">
      Nirbhay <span class="glow">&</span> Partner
    </h1>

    <div class="mt-6 text-white" id="countdown"></div>
  </div>
</section>

<!-- MEMORY -->
<section class="py-16 text-center parallax">
  <h2 class="text-3xl font-[Great_Vibes] text-[#D4AF37] mb-6">
    Our Journey Continues...
  </h2>

  <div class="slider max-w-md mx-auto">
    <img src="https://picsum.photos/600/400?1" style="opacity:1">
    <img src="https://picsum.photos/600/400?2">
    <img src="https://picsum.photos/600/400?3">
  </div>
</section>

<!-- MAP -->
<section class="py-16 text-center parallax">
  <h2 class="text-3xl font-[Playfair_Display]">Venue</h2>
  <p class="mb-4">Grand Palace, Lucknow</p>

  <a href="https://maps.google.com?q=Lucknow" target="_blank">
    <img src="https://maps.googleapis.com/maps/api/staticmap?center=Lucknow&zoom=14&size=600x300&markers=color:gold|Lucknow" class="mx-auto shadow-lg">
  </a>
</section>

</div>
</div>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// ENVELOPE FLOW
function openInvite(){
  document.querySelector('.flap').classList.add('open');

  setTimeout(()=>{
    document.getElementById('envelope').style.display='none';
    let intro = document.getElementById('intro');
    intro.style.opacity = 1;

    setTimeout(()=>{
      intro.style.display='none';
      document.getElementById('main').classList.remove('hidden');
    },2500);

  },1000);
}

// COUNTDOWN
const target = new Date("Nov 30, 2026").getTime();
setInterval(()=>{
  let now = new Date().getTime();
  let diff = target - now;

  let d = Math.floor(diff/(1000*60*60*24));
  let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((diff%(1000*60*60))/(1000*60));
  let s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    `${d}D ${h}H ${m}M ${s}S`;
},1000);

// SLIDER
let i=0;
const slides=document.querySelectorAll(".slider img");
setInterval(()=>{
  slides.forEach(img=>img.style.opacity=0);
  slides[i].style.opacity=1;
  i=(i+1)%slides.length;
},3000);

// PARALLAX
window.addEventListener("scroll",()=>{
  document.querySelectorAll(".parallax").forEach(el=>{
    let speed = 0.2;
    el.style.transform = `translateY(${window.scrollY * speed}px)`;
  });
});

// MUSIC
const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

btn.onclick=()=>{
  if(music.paused){
    music.play();
    btn.innerText="⏸";
  } else {
    music.pause();
    btn.innerText="🎵";
  }
};
</script>

</body>
</html>
