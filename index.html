<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #FDF5E6;
  overflow-x: hidden;
}

/* GOLD BORDER */
.border-frame {
  border: 8px solid transparent;
  background: linear-gradient(#FDF5E6, #FDF5E6) padding-box,
              linear-gradient(45deg, #D4AF37, #fff2c2, #D4AF37) border-box;
}

/* ENVELOPE */
.envelope-container {
  position: fixed;
  inset: 0;
  background: #FDF5E6;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  overflow: hidden;
}

.envelope {
  width: 260px;
  height: 160px;
  background: #D4AF37;
  position: relative;
  cursor: pointer;
  border-radius: 6px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #c9a52f;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
}

.open .flap {
  transform: rotateX(180deg);
}

/* Reveal animation */
.reveal {
  animation: revealPage 1.2s ease forwards;
}

@keyframes revealPage {
  from {transform: scale(0.6); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

/* HERO */
.video-bg {
  height: 100vh;
  position: relative;
}

.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

/* NAME */
.name {
  font-family: 'Playfair Display';
  font-size: clamp(2.5rem,6vw,5rem);
  color: white;
}

.glow {
  color: #D4AF37;
  text-shadow: 0 0 25px rgba(212,175,55,0.9);
}

/* COUNTDOWN */
.count-box {
  color: white;
  text-align: center;
  padding: 10px;
}

.count-box span {
  font-size: 1.5rem;
  display: block;
  text-shadow: 0 0 15px rgba(212,175,55,0.8);
}

/* SLIDER FIXED */
.slider {
  max-width: 90%;
  margin: auto;
  position: relative;
}

.slider img {
  width: 100%;
  border-radius: 12px;
  display: none;
}

.slider img.active {
  display: block;
}

/* MAP FIXED */
.map-container {
  max-width: 90%;
  margin: auto;
}

.map-container img {
  width: 100%;
  border-radius: 12px;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #D4AF37;
  color: white;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div class="envelope-container" id="envelopeContainer">
  <div class="envelope" onclick="openInvite(this)">
    <div class="flap"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

<div class="border-frame">

<!-- HERO -->
<section class="video-bg">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>

  <div class="overlay"></div>

  <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4">
    <h1 class="name">
      Nirbhay <span class="glow">&</span> Partner
    </h1>

    <!-- Countdown -->
    <div class="flex gap-4 mt-6" id="countdown"></div>
  </div>
</section>

<!-- MEMORY -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-[Great_Vibes] text-[#D4AF37] mb-6">
    Our Journey Continues...
  </h2>

  <div class="slider">
    <img src="https://picsum.photos/600/400?1" class="active">
    <img src="https://picsum.photos/600/400?2">
    <img src="https://picsum.photos/600/400?3">
  </div>
</section>

<!-- MAP -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-[Playfair_Display] mb-4">Venue</h2>
  <p class="mb-4">Grand Palace, Lucknow</p>

  <div class="map-container">
    <a href="https://maps.google.com?q=Lucknow" target="_blank">
      <img src="https://maps.googleapis.com/maps/api/staticmap?center=Lucknow&zoom=14&size=600x300&markers=color:gold|Lucknow">
    </a>
  </div>
</section>

</div>
</div>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// ENVELOPE FIXED
function openInvite(el){
  el.classList.add("open");

  setTimeout(()=>{
    document.getElementById("envelopeContainer").style.display="none";
    const main = document.getElementById("main");
    main.classList.remove("hidden");
    main.classList.add("reveal");
  },1000);
}

// COUNTDOWN BEAUTIFIED
const target = new Date("Nov 30, 2026").getTime();
setInterval(()=>{
  let now = new Date().getTime();
  let diff = target - now;

  let d = Math.floor(diff/(1000*60*60*24));
  let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((diff%(1000*60*60))/(1000*60));
  let s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML = `
    <div class="count-box"><span>${d}</span>Days</div>
    <div class="count-box"><span>${h}</span>Hours</div>
    <div class="count-box"><span>${m}</span>Minutes</div>
    <div class="count-box"><span>${s}</span>Seconds</div>
  `;
},1000);

// SLIDER FIXED
let i=0;
const slides=document.querySelectorAll(".slider img");
setInterval(()=>{
  slides.forEach(img=>img.classList.remove("active"));
  slides[i].classList.add("active");
  i=(i+1)%slides.length;
},3000);

// MUSIC
const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

btn.onclick=()=>{
  if(music.paused){
    music.play();
    btn.innerText="⏸";
  } else {
    music.pause();
    btn.innerText="🎵";
  }
};
</script>

</body>
</html>
