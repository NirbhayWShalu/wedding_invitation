<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  background: #FDF5E6;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

/* MOBILE ONLY FRAME */
html, body {
  max-width: 480px;
  margin: auto;
}

/* HERO */
.video-section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #FDF5E6;
}

.video-box {
  position: relative;
  width: 100%;
}

.video-box video {
  width: 100%;
  object-fit: contain;
  display: block;
  background: #FDF5E6;
}

/* OVERLAY */
.overlay-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.name {
  font-family: 'Playfair Display';
  font-size: 2.2rem;
  color: white;
}

.name span { color: #D4AF37; }

.invite-line {
  font-family: 'Cormorant Garamond';
  color: #f3e3a2;
  font-size: 0.9rem;
}

/* GANESHA */
.ganesha-center {
  width: 40px;
  margin-bottom: 8px;
}

/* COUNTDOWN */
.count-wrap {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.count-box {
  color: white;
  font-size: 0.75rem;
  text-align: center;
}

.count-box span {
  color: #D4AF37;
  font-size: 1.2rem;
}

/* 🪔 QUOTE SECTION (FILLS EMPTY SPACE) */
.quote-section {
  padding: 25px 15px;
  text-align: center;
  background: linear-gradient(to bottom, #FDF5E6, #f7ecd4);
}

.quote {
  font-family: 'Cormorant Garamond';
  font-size: 1rem;
  color: #333;
  line-height: 1.6;
}

.divider {
  width: 60px;
  height: 2px;
  background: #D4AF37;
  margin: 10px auto;
  border-radius: 5px;
}

/* JOURNEY */
.section {
  padding: 40px 15px;
  text-align: center;
}

.section h2 {
  font-family: 'Playfair Display';
  color: #D4AF37;
}

/* SLIDER */
.slider {
  height: 200px;
  position: relative;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0;
  transition: 1s;
}

.slide.active { opacity: 1; }

/* MAP */
.map {
  border-radius: 12px;
  overflow: hidden;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #D4AF37;
  color: white;
  padding: 10px;
  border-radius: 50%;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="video-section">

  <div class="video-box">

    <video autoplay muted loop>
      <source src="https://www.w3schools.com/howto/rain.mp4">
    </video>

    <div class="overlay-content">

      <img src="lordganesh.png" class="ganesha-center">

      <h1 class="name">Nirbhay <span>&</span> Partner</h1>

      <p class="invite-line">
        Together with their families, request your presence
      </p>

      <div class="count-wrap" id="countdown"></div>

    </div>
  </div>
</section>

<!-- 🪔 FILLER QUOTE SECTION -->
<div class="quote-section">
  <div class="divider"></div>
  <p class="quote">
    “Two hearts, one journey, a lifetime of memories begins here.”
  </p>
  <div class="divider"></div>
</div>

<!-- JOURNEY -->
<div class="section">
  <h2>Our Journey Continues</h2>

  <div class="slider">
    <img src="https://picsum.photos/400/300?1" class="slide active">
    <img src="https://picsum.photos/400/300?2" class="slide">
    <img src="https://picsum.photos/400/300?3" class="slide">
  </div>
</div>

<!-- MAP -->
<div class="section">
  <h2>Venue</h2>
  <p>Grand Palace, Lucknow</p>

  <div class="map">
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18..."
      width="100%" height="220" style="border:0;">
    </iframe>
  </div>
</div>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

// countdown ONLY M D H M S
const targetDate = new Date("Nov 30, 2026");

function updateCountdown(){
  const now = new Date();

  let months = (targetDate.getFullYear()-now.getFullYear())*12 + (targetDate.getMonth()-now.getMonth());
  let days = targetDate.getDate()-now.getDate();

  if(days<0){
    months--;
    days+=30;
  }

  let hours = targetDate.getHours()-now.getHours();
  let minutes = targetDate.getMinutes()-now.getMinutes();
  let seconds = targetDate.getSeconds()-now.getSeconds();

  if(seconds<0){ seconds+=60; minutes--; }
  if(minutes<0){ minutes+=60; hours--; }
  if(hours<0){ hours+=24; days--; }

  document.getElementById("countdown").innerHTML = `
    <div class="count-box"><span>${months}</span>M</div>
    <div class="count-box"><span>${days}</span>D</div>
    <div class="count-box"><span>${hours}</span>H</div>
    <div class="count-box"><span>${minutes}</span>M</div>
    <div class="count-box"><span>${seconds}</span>S</div>
  `;
}

setInterval(updateCountdown,1000);
updateCountdown();

// slider
let i=0;
const slides=document.querySelectorAll(".slide");
setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
  i=(i+1)%slides.length;
},3000);

// music
const music=document.getElementById("music");
document.getElementById("musicBtn").onclick=()=>{
  music.paused ? music.play() : music.pause();
};

</script>

</body>
</html>
