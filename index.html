<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #FDF5E6;
  overflow-x: hidden;
}

/* VIDEO BACKGROUND */
.video-bg {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.video-bg video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* DARK CINEMATIC OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.4));
}

/* NAME ANIMATION */
.name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  color: white;
  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 2s ease forwards;
}

/* Glow effect */
.glow {
  color: #D4AF37;
  text-shadow:
    0 0 10px rgba(212,175,55,0.6),
    0 0 20px rgba(212,175,55,0.5),
    0 0 30px rgba(212,175,55,0.4);
  animation: pulse 2.5s infinite alternate;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulse {
  from { text-shadow: 0 0 10px rgba(212,175,55,0.5); }
  to { text-shadow: 0 0 25px rgba(212,175,55,0.9); }
}

/* Countdown Glass */
.glass {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
}

/* Music Button */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #D4AF37;
  color: white;
  padding: 10px 14px;
  border-radius: 50px;
  cursor: pointer;
}

/* Scroll indicator */
.scroll-down {
  position: absolute;
  bottom: 30px;
  color: white;
  font-size: 14px;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(10px);}
}
</style>
</head>

<body>

<!-- HERO VIDEO SECTION -->
<section class="video-bg">

  <!-- Replace with your pre-wedding video -->
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- CONTENT -->
  <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-6">

    <h1 class="name">
      Nirbhay <span class="glow">&</span> Partner
    </h1>

    <!-- Countdown -->
    <div class="glass mt-8 p-5 rounded-xl text-white">
      <div id="countdown" class="flex gap-6 text-lg md:text-xl"></div>
    </div>

    <div class="scroll-down">Scroll ↓</div>
  </div>

</section>

<!-- NEXT SECTION (your previous overlay section) -->
<section class="py-20 text-center" data-aos="fade-up">
  <h2 class="text-3xl font-[Great_Vibes] text-[#D4AF37] mb-6">Our Journey Continues...</h2>
</section>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

<script>
AOS.init();

// Countdown
const target = new Date("Nov 30, 2026 00:00:00").getTime();
const countdown = document.getElementById("countdown");

setInterval(()=>{
  let now = new Date().getTime();
  let diff = target - now;

  let d = Math.floor(diff/(1000*60*60*24));
  let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((diff%(1000*60*60))/(1000*60));
  let s = Math.floor((diff%(1000*60))/1000);

  countdown.innerHTML = `
    <div>${d}<br>Days</div>
    <div>${h}<br>Hours</div>
    <div>${m}<br>Minutes</div>
    <div>${s}<br>Seconds</div>
  `;
},1000);

// Music toggle
const music = document.getElementById('music');
const btn = document.getElementById('musicBtn');

btn.onclick = () => {
  if(music.paused){
    music.play();
    btn.innerText="⏸";
  } else {
    music.pause();
    btn.innerText="🎵";
  }
};
</script>

</body>
</html>
