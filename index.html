<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #FDF5E6;
  margin: 0;
}

/* 💌 ENVELOPE SCREEN */
.envelope-screen {
  position: fixed;
  inset: 0;
  background: #FDF5E6;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* CONTAINER */
.envelope-container {
  position: relative;
  width: 260px;
  height: 180px;
  cursor: pointer;
}

/* ENVELOPE BODY (CLIPS CONTENT) */
.envelope-body {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #D4AF37;
  border-radius: 6px;
  overflow: hidden; /* 🔥 KEY FIX */
  z-index: 2;
}

/* FLAP */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #caa533;
  clip-path: polygon(0 0,100% 0,50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 3;
}

/* CARD (INSIDE ENVELOPE) */
.invite-card {
  position: absolute;
  width: 90%;
  height: 140px;
  background: white;
  left: 5%;
  bottom: -100px; /* starts inside */
  border-radius: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Playfair Display';
  font-size: 1.2rem;
  transition: transform 1.2s ease;
}

/* OPEN STATES */
.open .flap {
  transform: rotateX(180deg);
}
.open .invite-card {
  transform: translateY(-200px);
}

/* EXPAND */
.expand {
  animation: expandCard 1s forwards;
}
@keyframes expandCard {
  to {
    transform: translateY(-200px) scale(10);
    opacity: 0;
  }
}

/* 🧧 CORNERS */
.corner {
  position: fixed;
  width: 90px;
  z-index: 5;
}
.top-left { top:0; left:0; }
.top-right { top:0; right:0; transform: rotate(90deg); }
.bottom-left { bottom:0; left:0; transform: rotate(-90deg); }
.bottom-right { bottom:0; right:0; transform: rotate(180deg); }

/* 🕉️ GANESHA */
.ganesha {
  position: fixed;
  top: 15px;
  left: 15px;
  width: 55px;
  z-index: 50;
  background: rgba(255,255,255,0.7);
  padding: 6px;
  border-radius: 50%;
  backdrop-filter: blur(4px);
  box-shadow: 0 0 10px rgba(212,175,55,0.4);
}

/* HERO */
.video-bg {
  height: 100vh;
  position: relative;
}
.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

/* NAME */
.name {
  font-family: 'Playfair Display';
  font-size: clamp(2.5rem,6vw,5rem);
  color: white;
  animation: fadeUp 1.5s forwards;
}
.name span {
  color: #D4AF37;
  text-shadow: 0 0 12px rgba(212,175,55,0.7);
}
@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* INVITE LINE */
.invite-line {
  font-family: 'Cormorant Garamond', serif;
  color: #f3e3a2;
  font-size: 1.1rem;
  margin-top: 10px;
}

/* COUNTDOWN */
.count-box {
  color: white;
  text-align: center;
}
.count-box span {
  font-size: 1.5rem;
  color: #D4AF37;
}

/* MEMORY */
.slider {
  max-width: 360px;
  height: 240px;
  margin: auto;
  position: relative;
}
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 1s;
}
.slide.active { opacity: 1; }

/* MAP */
.map-card {
  max-width: 360px;
  margin: auto;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #ddd;
  background: white;
}
.map-card img {
  width: 100%;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #D4AF37;
  color: white;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 💌 ENVELOPE -->
<div class="envelope-screen" id="envelopeScreen">
  <div class="envelope-container" onclick="openInvite()">
    
    <div class="envelope-body">
      <div class="invite-card" id="inviteCard">
        Wedding Invitation
      </div>
    </div>

    <div class="flap"></div>

  </div>
</div>

<!-- 🧧 CORNERS -->
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Floral_corner_gold.svg" class="corner top-left">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Floral_corner_gold.svg" class="corner top-right">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Floral_corner_gold.svg" class="corner bottom-left">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Floral_corner_gold.svg" class="corner bottom-right">

<!-- 🕉️ GANESHA -->
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ganesha_Vector.svg/512px-Ganesha_Vector.svg.png" 
     alt="Lord Ganesha" class="ganesha">

<!-- MAIN -->
<div id="main" style="display:none;">

<section class="video-bg">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="overlay"></div>

  <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4">
    <h1 class="name">
      Nirbhay <span>&</span> Partner
    </h1>

    <p class="invite-line">
      Together with their families, request the pleasure of your presence
    </p>

    <div class="flex gap-4 mt-6 flex-wrap justify-center" id="countdown"></div>
  </div>
</section>

<section class="py-16 text-center">
  <h2 class="text-3xl font-[Playfair_Display] text-[#D4AF37] mb-6">
    Our Journey Continues
  </h2>

  <div class="slider">
    <img src="https://picsum.photos/600/400?1" class="slide active">
    <img src="https://picsum.photos/600/400?2" class="slide">
    <img src="https://picsum.photos/600/400?3" class="slide">
  </div>
</section>

<section class="py-16 text-center">
  <h2 class="text-3xl font-[Playfair_Display] mb-4">Venue</h2>
  <p class="mb-4">Grand Palace, Lucknow</p>

  <div class="map-card">
    <a href="https://maps.google.com?q=Lucknow" target="_blank">
      <img src="https://maps.googleapis.com/maps/api/staticmap?center=Lucknow&zoom=14&size=600x300&markers=color:gold|Lucknow">
    </a>
  </div>
</section>

</div>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// 💌 ENVELOPE (FIXED)
function openInvite(){
  const container = document.querySelector('.envelope-container');
  const card = document.getElementById('inviteCard');

  container.classList.add("open");

  setTimeout(()=>{
    card.classList.add("expand");
  },1200);

  setTimeout(()=>{
    document.getElementById("envelopeScreen").style.display="none";
    document.getElementById("main").style.display="block";
  },2000);
}

// ⏱️ COUNTDOWN
const targetDate = new Date("Nov 30, 2026");

function updateCountdown() {
  const now = new Date();

  let years = targetDate.getFullYear() - now.getFullYear();
  let months = targetDate.getMonth() - now.getMonth();
  let days = targetDate.getDate() - now.getDate();

  if (days < 0) {
    months--;
    const prevMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    days += prevMonth.getDate();
  }

  if (months < 0) {
    years--;
    months += 12;
  }

  let hours = targetDate.getHours() - now.getHours();
  let minutes = targetDate.getMinutes() - now.getMinutes();
  let seconds = targetDate.getSeconds() - now.getSeconds();

  if (seconds < 0) { seconds += 60; minutes--; }
  if (minutes < 0) { minutes += 60; hours--; }
  if (hours < 0) { hours += 24; days--; }

  document.getElementById("countdown").innerHTML = `
    ${years > 0 ? `<div class="count-box"><span>${years}</span>Years</div>` : ""}
    <div class="count-box"><span>${months}</span>Months</div>
    <div class="count-box"><span>${days}</span>Days</div>
    <div class="count-box"><span>${hours}</span>Hours</div>
    <div class="count-box"><span>${minutes}</span>Minutes</div>
    <div class="count-box"><span>${seconds}</span>Seconds</div>
  `;
}

setInterval(updateCountdown, 1000);
updateCountdown();

// SLIDER
let i=0;
const slides=document.querySelectorAll(".slide");
setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
  i=(i+1)%slides.length;
},3000);

// MUSIC
const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

btn.onclick=()=>{
  if(music.paused){
    music.play();
    btn.innerText="⏸";
  } else {
    music.pause();
    btn.innerText="🎵";
  }
};
</script>

</body>
</html>
