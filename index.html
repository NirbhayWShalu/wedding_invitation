<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  background: #FDF5E6;
  font-family: 'Montserrat', sans-serif;
}

/* 📱 MOBILE ONLY */
html, body {
  max-width: 480px;
  margin: auto;
  overflow-x: hidden;
}

/* 🕉️ GANESHA ABOVE HEADER */
.ganesha-top {
  display: flex;
  justify-content: center;
  padding-top: 10px;
}

.ganesha-top img {
  width: 55px;
  filter: drop-shadow(0 0 6px rgba(212,175,55,0.5));
}

/* 🎀 HEADER */
.header {
  text-align: center;
  padding: 8px 10px 0px;
}

.header h1 {
  font-family: 'Playfair Display';
  font-size: 1.6rem;
  color: #333;
}

.header h2 {
  font-family: 'Cormorant Garamond';
  font-size: 1.3rem;
  color: #D4AF37;
}

/* 🎬 INTRO */
#introScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  transition: opacity 0.8s ease;
}

.intro-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(8px) brightness(0.6);
}

.intro-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

.intro-content {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
}

.intro-name {
  font-family: 'Playfair Display';
  font-size: 2rem;
  color: white;
}

.intro-name span {
  color: #D4AF37;
}

.intro-date {
  color: #D4AF37;
  font-family: 'Cormorant Garamond';
  margin-top: 8px;
}

/* 🎥 HERO */
.video-section {
  min-height: 100vh;
  background: #FDF5E6;
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-box {
  position: relative;
  width: 100%;
}

.video-box video {
  width: 100%;
  object-fit: contain;
  background: #FDF5E6;
}

/* OVERLAY */
.overlay-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.name {
  font-family: 'Playfair Display';
  font-size: 2.2rem;
  color: white;
}

.name span {
  color: #D4AF37;
}

.invite-line {
  font-family: 'Cormorant Garamond';
  color: #f3e3a2;
  font-size: 0.9rem;
  margin-top: 5px;
}

/* COUNTDOWN */
.count-wrap {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.count-box {
  color: white;
  font-size: 0.75rem;
  text-align: center;
}

.count-box span {
  color: #D4AF37;
  font-size: 1.2rem;
}
</style>
</head>

<body>

<!-- 🕉️ GANESHA -->
<div class="ganesha-top">
  <img src="lordganesh.png" alt="Ganesha">
</div>

<!-- 🎀 HEADER -->
<div class="header">
  <h1>Wedding Invitation</h1>
  <h2>शुभ विवाह</h2>
</div>

<!-- 🎬 INTRO -->
<div id="introScreen">
  <video autoplay muted loop class="intro-video">
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="intro-overlay"></div>

  <div class="intro-content">
    <h1 class="intro-name">Nirbhay <span>&</span> Shalu</h1>
    <p class="intro-date">30 November 2026</p>
  </div>
</div>

<!-- 🎥 HERO -->
<section class="video-section">

  <div class="video-box">

    <video autoplay muted loop>
      <source src="https://www.w3schools.com/howto/rain.mp4">
    </video>

    <div class="overlay-content">

      <h1 class="name">Nirbhay <span>&</span> Shalu</h1>

      <p class="invite-line">
        Together with their families, request your presence
      </p>

      <div class="count-wrap" id="countdown"></div>

    </div>
  </div>
</section>

<script>

/* ✅ FIXED INTRO (NO STUCK EVER) */
window.addEventListener("load", () => {

  const intro = document.getElementById("introScreen");
  const main = document.getElementById("main");

  let closed = false;

  function closeIntro() {
    if (closed) return;
    closed = true;

    intro.style.opacity = "0";

    setTimeout(() => {
      intro.style.display = "none";
      if (main) main.style.display = "block";
    }, 800);
  }

  setTimeout(closeIntro, 1800);
  setTimeout(closeIntro, 3500);

  intro.addEventListener("click", closeIntro);
});

/* ⏱️ COUNTDOWN (UNCHANGED LOGIC) */
const targetDate = new Date("Nov 30, 2026");

function updateCountdown(){
  const now = new Date();

  let months = (targetDate.getFullYear()-now.getFullYear())*12 + (targetDate.getMonth()-now.getMonth());
  let days = targetDate.getDate()-now.getDate();

  if(days < 0){
    months--;
    days += 30;
  }

  let hours = targetDate.getHours()-now.getHours();
  let minutes = targetDate.getMinutes()-now.getMinutes();
  let seconds = targetDate.getSeconds()-now.getSeconds();

  if(seconds < 0){ seconds += 60; minutes--; }
  if(minutes < 0){ minutes += 60; hours--; }
  if(hours < 0){ hours += 24; days--; }

  document.getElementById("countdown").innerHTML = `
    <div class="count-box"><span>${months}</span>M</div>
    <div class="count-box"><span>${days}</span>D</div>
    <div class="count-box"><span>${hours}</span>H</div>
    <div class="count-box"><span>${minutes}</span>M</div>
    <div class="count-box"><span>${seconds}</span>S</div>
  `;
}

setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
