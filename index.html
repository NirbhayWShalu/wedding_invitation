<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  background: #FDF5E6;
  font-family: 'Montserrat', sans-serif;
}

/* 📱 MOBILE ONLY */
html, body {
  max-width: 480px;
  margin: auto;
  overflow-x: hidden;
}

/* 🎀 HEADER */
.header {
  text-align: center;
  padding: 15px 10px 5px;
}

.header h1 {
  font-family: 'Playfair Display';
  font-size: 1.6rem;
  color: #333;
}

.header h2 {
  font-family: 'Cormorant Garamond';
  font-size: 1.3rem;
  color: #D4AF37;
}

/* 🎬 INTRO */
#introScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
}

.intro-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(8px) brightness(0.6);
}

.intro-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

.intro-content {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
}

.intro-name {
  font-family: 'Playfair Display';
  font-size: 2rem;
  color: white;
}
.intro-name span {
  color: #D4AF37;
}

/* 🎥 HERO */
.video-section {
  min-height: 100vh;
  background: #FDF5E6;
  display: flex;
  justify-content: center;
  align-items: center;
}

.video-box {
  position: relative;
  width: 100%;
}

.video-box video {
  width: 100%;
  object-fit: contain;
  background: #FDF5E6;
}

/* OVERLAY CONTENT */
.overlay-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 10px;
}

.name {
  font-family: 'Playfair Display';
  font-size: 2.2rem;
  color: white;
}

.name span {
  color: #D4AF37;
}

.invite-line {
  font-family: 'Cormorant Garamond';
  color: #f3e3a2;
  font-size: 0.9rem;
  margin-top: 5px;
}

/* 🕉️ GANESHA */
.ganesha-center {
  width: 42px;
  margin-bottom: 8px;
}

/* ⏱️ COUNTDOWN */
.count-wrap {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.count-box {
  color: white;
  font-size: 0.75rem;
  text-align: center;
}

.count-box span {
  color: #D4AF37;
  font-size: 1.2rem;
}

/* 🪔 QUOTE SECTION */
.quote-section {
  padding: 25px 15px;
  text-align: center;
}

.divider {
  width: 60px;
  height: 2px;
  background: #D4AF37;
  margin: 10px auto;
}

.quote {
  font-family: 'Cormorant Garamond';
  color: #333;
  font-size: 1rem;
}

/* SLIDER */
.slider {
  height: 200px;
  position: relative;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0;
  transition: 1s;
}

.slide.active {
  opacity: 1;
}
</style>
</head>

<body>

<!-- 🎀 HEADER -->
<div class="header">
  <h1>Wedding Invitation</h1>
  <h2>शुभ विवाह</h2>
</div>

<!-- 🎬 INTRO -->
<div id="introScreen">
  <video autoplay muted loop class="intro-video">
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="intro-overlay"></div>

  <div class="intro-content">
    <h1 class="intro-name">Nirbhay <span>&</span> Shalu</h1>
  </div>
</div>

<!-- 🎥 HERO -->
<section class="video-section">

  <div class="video-box">

    <video autoplay muted loop>
      <source src="https://www.w3schools.com/howto/rain.mp4">
    </video>

    <div class="overlay-content">

      <img src="lordganesh.png" class="ganesha-center">

      <h1 class="name">Nirbhay <span>&</span> Shalu</h1>

      <p class="invite-line">
        Together with their families, request your presence
      </p>

      <div class="count-wrap" id="countdown"></div>

    </div>
  </div>

</section>

<!-- 🪔 QUOTE -->
<div class="quote-section">
  <div class="divider"></div>
  <p class="quote">
    “Two hearts, one journey, a lifetime begins here.”
  </p>
  <div class="divider"></div>
</div>

<!-- 🌸 JOURNEY -->
<div class="quote-section">
  <h2 style="font-family:'Playfair Display'; color:#D4AF37;">
    Our Journey Continues
  </h2>

  <div class="slider">
    <img src="https://picsum.photos/400/300?1" class="slide active">
    <img src="https://picsum.photos/400/300?2" class="slide">
    <img src="https://picsum.photos/400/300?3" class="slide">
  </div>
</div>

<script>

// 🎬 INTRO AUTO CLOSE
window.onload = () => {
  setTimeout(() => {
    document.getElementById("introScreen").style.display = "none";
  }, 2000);
};

// ⏱️ COUNTDOWN (M D H M S)
const targetDate = new Date("Nov 30, 2026");

function updateCountdown() {
  const now = new Date();

  let months = (targetDate.getFullYear()-now.getFullYear())*12 + (targetDate.getMonth()-now.getMonth());
  let days = targetDate.getDate()-now.getDate();

  if (days < 0) {
    months--;
    days += 30;
  }

  let hours = targetDate.getHours()-now.getHours();
  let minutes = targetDate.getMinutes()-now.getMinutes();
  let seconds = targetDate.getSeconds()-now.getSeconds();

  if (seconds < 0) { seconds += 60; minutes--; }
  if (minutes < 0) { minutes += 60; hours--; }
  if (hours < 0) { hours += 24; days--; }

  document.getElementById("countdown").innerHTML = `
    <div class="count-box"><span>${months}</span>M</div>
    <div class="count-box"><span>${days}</span>D</div>
    <div class="count-box"><span>${hours}</span>H</div>
    <div class="count-box"><span>${minutes}</span>M</div>
    <div class="count-box"><span>${seconds}</span>S</div>
  `;
}

setInterval(updateCountdown, 1000);
updateCountdown();

// 🌸 SLIDER
let i = 0;
const slides = document.querySelectorAll(".slide");

setInterval(() => {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
  i = (i + 1) % slides.length;
}, 3000);

</script>

</body>
</html>
