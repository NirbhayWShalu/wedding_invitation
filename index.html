<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #FDF5E6;
  overflow-x: hidden;
}

/* 🌸 PETALS */
.petal {
  position: fixed;
  top: -10px;
  width: 12px;
  height: 12px;
  background: radial-gradient(circle, #ffb6c1, #ff69b4);
  border-radius: 50%;
  opacity: 0.6;
  pointer-events: none;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}

/* 🧧 FLORAL BORDER */
.border-frame {
  position: relative;
  padding: 12px;
}

.border-frame::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 10px solid transparent;
  background: linear-gradient(#FDF5E6,#FDF5E6) padding-box,
              linear-gradient(45deg,#D4AF37,#fff2c2,#D4AF37) border-box;
  z-index: -1;
}

/* subtle shimmer */
.border-frame::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 6s infinite;
  pointer-events: none;
}

@keyframes shimmer {
  0% {transform: translateX(-100%);}
  100% {transform: translateX(100%);}
}

/* GANESHA */
.ganesha {
  position: fixed;
  top: 15px;
  left: 15px;
  width: 45px;
}

/* HERO */
.video-bg {
  height: 100vh;
  position: relative;
}
.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

/* NAME */
.name {
  font-family: 'Playfair Display';
  font-size: clamp(2.5rem,6vw,5rem);
  color: white;
}
.glow {
  color: #D4AF37;
  text-shadow: 0 0 25px rgba(212,175,55,0.9);
}

/* COUNTDOWN */
.count-box {
  color: white;
  text-align: center;
}
.count-box span {
  font-size: 1.4rem;
  display: block;
  text-shadow: 0 0 12px rgba(212,175,55,0.7);
}

/* QUOTE */
.quote {
  font-family: 'Playfair Display';
  font-style: italic;
  max-width: 600px;
  margin: auto;
  color: #555;
}

/* SLIDER */
.slider {
  width: 80%;
  max-width: 380px;
  margin: auto;
  position: relative;
}
.slide {
  position: absolute;
  width: 100%;
  border-radius: 12px;
  opacity: 0;
  transform: scale(0.9);
  transition: 0.8s;
}
.slide.active {
  opacity: 1;
  transform: scale(1);
}

/* MAP */
.map-card {
  max-width: 420px;
  margin: auto;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #D4AF37;
  color: white;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🌸 PETALS SCRIPT -->
<script>
for(let i=0;i<20;i++){
  let p=document.createElement("div");
  p.className="petal";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(p);
}
</script>

<!-- 🕉️ GANESHA -->
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Ganesha_simple_icon.png" class="ganesha">

<div class="border-frame">

<!-- HERO -->
<section class="video-bg">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>

  <div class="overlay"></div>

  <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4">
    <h1 class="name">
      Nirbhay <span class="glow">&</span> Partner
    </h1>

    <div class="flex gap-4 mt-6" id="countdown"></div>
  </div>
</section>

<!-- QUOTE -->
<section class="py-12 text-center">
  <p class="quote">
    "Where there is love, there is life."
  </p>
</section>

<!-- MEMORY -->
<section class="py-12 text-center">
  <h2 class="text-3xl font-[Great_Vibes] text-[#D4AF37] mb-6">
    Our Journey Continues...
  </h2>

  <div class="slider">
    <img src="https://picsum.photos/600/400?1" class="slide active">
    <img src="https://picsum.photos/600/400?2" class="slide">
    <img src="https://picsum.photos/600/400?3" class="slide">
  </div>
</section>

<!-- MAP -->
<section class="py-16 text-center">
  <h2 class="text-3xl font-[Playfair_Display] mb-4">Venue</h2>
  <p class="mb-4">Grand Palace, Lucknow</p>

  <div class="map-card">
    <a href="https://maps.google.com?q=Lucknow" target="_blank">
      <img src="https://maps.googleapis.com/maps/api/staticmap?center=Lucknow&zoom=14&size=600x300&markers=color:gold|Lucknow">
    </a>
    <div class="p-4 text-sm text-gray-600">Tap to open in Google Maps</div>
  </div>
</section>

</div>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// COUNTDOWN
const target = new Date("Nov 30, 2026").getTime();
setInterval(()=>{
  let now = new Date().getTime();
  let diff = target - now;

  let d = Math.floor(diff/(1000*60*60*24));
  let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((diff%(1000*60*60))/(1000*60));
  let s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML = `
    <div class="count-box"><span>${d}</span>Days</div>
    <div class="count-box"><span>${h}</span>Hours</div>
    <div class="count-box"><span>${m}</span>Minutes</div>
    <div class="count-box"><span>${s}</span>Seconds</div>
  `;
},1000);

// SLIDER
let i=0;
const slides=document.querySelectorAll(".slide");
setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
  i=(i+1)%slides.length;
},3500);

// MUSIC
const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

btn.onclick=()=>{
  if(music.paused){
    music.play();
    btn.innerText="⏸";
  } else {
    music.pause();
    btn.innerText="🎵";
  }
};
</script>

</body>
</html>
