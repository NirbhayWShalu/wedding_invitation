<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin:0; background:#FDF5E6; font-family:'Montserrat'; }

/* HEADER FIX */
.header { padding:6px 10px 0; margin:0; }
.header h1,.header h2 { margin:0; }

/* HERO GAP FIX */
.video-section { margin:0; padding:0; }

/* GANESHA */
.ganesha-top { display:flex; justify-content:center; padding-top:10px; }
.ganesha-top img { width:55px; }

/* NAME ANIMATION */
.name {
  opacity:0;
  transform:translateY(25px);
  animation:nameReveal 1.6s cubic-bezier(0.22,1,0.36,1) forwards;
  animation-delay:0.8s;
}
.name span {
  color:#D4AF37;
  text-shadow:0 0 8px rgba(212,175,55,0.6);
}
@keyframes nameReveal {
  to { opacity:1; transform:translateY(0); }
}

/* INTRO */
#introScreen { position:fixed; inset:0; z-index:9999; }
.intro-video { position:absolute; width:100%; height:100%; object-fit:cover; }
.intro-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.4); }
.intro-content { position:relative; top:50%; transform:translateY(-50%); text-align:center; }
.intro-name { font-family:'Playfair Display'; font-size:2rem; color:white; }
.intro-date { color:#D4AF37; }

/* SCRATCH */
.scratch-wrapper { position:relative; width:220px; height:50px; margin:10px auto; }
#scratchCanvas { position:absolute; inset:0; width:100%; height:100%; }
.scratch-hint { position:absolute; bottom:-18px; width:100%; text-align:center; font-size:0.7rem; color:#eee; }

/* HERO */
.video-box video { width:100%; object-fit:contain; }
.overlay-content { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }

/* COUNTDOWN */
.count-section { text-align:center; padding:20px 0; }
.count-wrap { display:flex; justify-content:center; gap:10px; }
.count-box { width:60px; }
.flip-number { background:white; padding:8px; border-radius:8px; }
.flip-label { font-size:0.7rem; }

/* SLIDER */
.slider { max-width:360px; height:220px; margin:auto; position:relative; overflow:hidden; }
.slide {
 position:absolute; width:100%; height:100%; object-fit:cover;
 border-radius:14px; opacity:0; transform:scale(1.05);
 transition:1s;
}
.slide.active { opacity:1; transform:scale(1); }

/* MAP */
.map-card {
 max-width:360px; margin:auto;
 border-radius:16px; overflow:hidden;
 background:white; box-shadow:0 8px 25px rgba(0,0,0,0.12);
 text-align:center;
}
.map-card iframe { width:100%; height:220px; border:0; }
.map-btn { display:block; padding:10px; background:#D4AF37; color:white; text-decoration:none; }
</style>
</head>

<body>

<!-- GANESHA -->
<div class="ganesha-top">
  <img src="lordganesh.png">
</div>

<!-- HEADER -->
<div class="header text-center">
  <h1>Wedding Invitation</h1>
  <h2>शुभ विवाह</h2>
</div>

<!-- INTRO -->
<div id="introScreen">
  <video autoplay muted loop class="intro-video">
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="intro-overlay"></div>

  <div class="intro-content">
    <h1 class="intro-name">Nirbhay <span>&</span> Shalu</h1>

    <div class="scratch-wrapper">
      <div class="intro-date">30 November 2026</div>
      <canvas id="scratchCanvas"></canvas>
      <div class="scratch-hint">↷ Scratch to Reveal</div>
    </div>
  </div>
</div>

<!-- HERO -->
<section class="video-section">
<div class="video-box">
<video autoplay muted loop>
  <source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<div class="overlay-content">
  <h1 class="name">Nirbhay <span>&</span> Shalu</h1>
</div>
</div>
</section>

<!-- COUNTDOWN -->
<div class="count-section">
  <div id="countdown" class="count-wrap"></div>
</div>

<!-- SLIDER -->
<div class="slider">
  <img src="https://picsum.photos/400/300?1" class="slide active">
  <img src="https://picsum.photos/400/300?2" class="slide">
  <img src="https://picsum.photos/400/300?3" class="slide">
</div>

<!-- MAP -->
<div class="map-card">
<iframe src="https://www.google.com/maps/embed?pb=!1m13!1m8!1m3!1d3575.3392701684916!2d81.1581766!3d26.3478865!3m2!1i1024!2i768!4f13.1"></iframe>
<a href="https://maps.app.goo.gl/G5oBCF5rVryTMCJJ8" target="_blank" class="map-btn">Open in Google Maps</a>
</div>

<script>

/* SCRATCH */
const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");
canvas.width=220; canvas.height=50;
ctx.fillStyle="#bfa76a";
ctx.fillRect(0,0,canvas.width,canvas.height);

let scratch=false;

canvas.addEventListener("touchmove",e=>{
 const rect=canvas.getBoundingClientRect();
 const t=e.touches[0];
 const x=t.clientX-rect.left;
 const y=t.clientY-rect.top;

 ctx.globalCompositeOperation="destination-out";
 ctx.beginPath();
 ctx.arc(x,y,10,0,Math.PI*2);
 ctx.fill();
});

setTimeout(()=>document.getElementById("introScreen").style.display="none",3500);

/* COUNTDOWN */
const targetDate=new Date("Nov 30, 2026");

function updateCountdown(){
 const now=new Date();
 let m=(targetDate.getFullYear()-now.getFullYear())*12+(targetDate.getMonth()-now.getMonth());
 let d=targetDate.getDate()-now.getDate();
 if(d<0){m--; d+=30;}

 document.getElementById("countdown").innerHTML=`
 <div class="count-box"><div class="flip-number">${m}</div><div class="flip-label">M</div></div>
 <div class="count-box"><div class="flip-number">${d}</div><div class="flip-label">D</div></div>
 `;
}
setInterval(updateCountdown,1000);

/* SLIDER */
let i=0;
const slides=document.querySelectorAll(".slide");
setInterval(()=>{
 slides.forEach(s=>s.classList.remove("active"));
 slides[i].classList.add("active");
 i=(i+1)%slides.length;
},3000);

</script>

</body>
</html>
