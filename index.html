<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Montserrat', sans-serif;
  background: #FDF5E6;
  margin: 0;
}

/* 🎬 INTRO */
#introScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  overflow: hidden;
}

.intro-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(10px) brightness(0.6);
  transform: scale(1.2);
}

.intro-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

.intro-content {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
}

.intro-name {
  font-family: 'Playfair Display';
  font-size: clamp(2.5rem,6vw,4.5rem);
  color: white;
  opacity: 0;
  transform: scale(0.9);
  animation: introFade 2s forwards;
}
.intro-name span {
  color: #D4AF37;
  text-shadow: 0 0 20px rgba(212,175,55,0.8);
}

.intro-line {
  width: 0;
  height: 2px;
  background: #D4AF37;
  margin: 15px auto;
  animation: lineGrow 1.5s forwards;
  animation-delay: 1.2s;
}

.intro-sub {
  color: #ddd;
  opacity: 0;
  animation: fadeIn 2s forwards;
  animation-delay: 1.8s;
}

@keyframes introFade {
  to { opacity: 1; transform: scale(1); }
}
@keyframes fadeIn {
  to { opacity: 1; }
}
@keyframes lineGrow {
  to { width: 140px; }
}

/* 🧧 CORNERS */
.corner {
  position: fixed;
  width: 90px;
  z-index: 5;
}
.top-left { top:0; left:0; }
.top-right { top:0; right:0; transform: rotate(90deg); }
.bottom-left { bottom:0; left:0; transform: rotate(-90deg); }
.bottom-right { bottom:0; right:0; transform: rotate(180deg); }

/* HERO */
.video-bg {
  height: 100vh;
  position: relative;
}
.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

/* NAME */
.name {
  font-family: 'Playfair Display';
  font-size: clamp(2.5rem,6vw,5rem);
  color: white;
}
.name span {
  color: #D4AF37;
  text-shadow: 0 0 12px rgba(212,175,55,0.7);
}

/* INVITE LINE */
.invite-line {
  font-family: 'Cormorant Garamond', serif;
  color: #f3e3a2;
  font-size: 1.1rem;
  margin-top: 10px;
}

/* COUNTDOWN */
.count-box {
  color: white;
  text-align: center;
}
.count-box span {
  font-size: 1.5rem;
  color: #D4AF37;
}

/* MEMORY */
.slider {
  max-width: 360px;
  height: 240px;
  margin: auto;
  position: relative;
}
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 1s;
}
.slide.active { opacity: 1; }

/* MAP */
.map-card {
  max-width: 360px;
  margin: auto;
  border-radius: 12px;
  overflow: hidden;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #D4AF37;
  color: white;
  padding: 10px;
  border-radius: 50px;
  cursor: pointer;
}

/* 🕉️ GANESHA CENTER (UPDATED) */
.ganesha-center {
  width: 55px;
  margin-bottom: 12px;
  opacity: 0.95;
  background: none;
  padding: 0;
  border-radius: 0;
  filter: drop-shadow(0 0 6px rgba(212,175,55,0.6));
  animation: ganeshaFade 1.5s ease forwards;
}

@keyframes ganeshaFade {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 0.95; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="introScreen">
  <video autoplay muted loop class="intro-video">
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="intro-overlay"></div>

  <div class="intro-content">
    <h1 class="intro-name">
      Nirbhay <span>&</span> Partner
    </h1>
    <div class="intro-line"></div>
    <p class="intro-sub">30 November 2026</p>
  </div>
</div>

<!-- 🧧 CORNERS -->
<img src="Top.png" class="corner top-left">
<img src="Bottom.png" class="corner bottom-right">

<!-- MAIN -->
<div id="main" style="display:none;">

<section class="video-bg">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="overlay"></div>

  <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4">

    <!-- 🕉️ GANESHA CENTER -->
    <img src="lordganesh.png" alt="Lord Ganesha" class="ganesha-center">

    <h1 class="name">Nirbhay <span>&</span> Partner</h1>

    <p class="invite-line">
      Together with their families, request the pleasure of your presence
    </p>

    <div class="flex gap-4 mt-6 flex-wrap justify-center" id="countdown"></div>
  </div>
</section>

<section class="py-16 text-center">
  <h2 class="text-3xl font-[Playfair_Display] text-[#D4AF37] mb-6">
    Our Journey Continues
  </h2>

  <div class="slider">
    <img src="https://picsum.photos/600/400?1" class="slide active">
    <img src="https://picsum.photos/600/400?2" class="slide">
    <img src="https://picsum.photos/600/400?3" class="slide">
  </div>
</section>

<section class="py-16 text-center">
  <h2 class="text-3xl font-[Playfair_Display] mb-4">Venue</h2>
  <p class="mb-4">Grand Palace, Lucknow</p>

  <div class="map-card">
    <iframe 
      src="https://maps.google.com/maps?q=Lucknow&z=13&output=embed"
      width="100%" height="250" style="border:0;">
    </iframe>
  </div>
</section>

</div>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// 🎬 INTRO TRANSITION (UPDATED SPEED)
window.addEventListener("load", () => {
  setTimeout(() => {
    const intro = document.getElementById("introScreen");

    intro.style.transition = "all 0.8s ease";
    intro.style.opacity = "0";
    intro.style.transform = "scale(1.1)";

    setTimeout(() => {
      intro.style.display = "none";
      document.getElementById("main").style.display = "block";
    }, 800);

  }, 2200);
});

// ⏱️ COUNTDOWN
const targetDate = new Date("Nov 30, 2026");

function updateCountdown() {
  const now = new Date();

  let years = targetDate.getFullYear() - now.getFullYear();
  let months = targetDate.getMonth() - now.getMonth();
  let days = targetDate.getDate() - now.getDate();

  if (days < 0) {
    months--;
    const prevMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
    days += prevMonth.getDate();
  }

  if (months < 0) {
    years--;
    months += 12;
  }

  let hours = targetDate.getHours() - now.getHours();
  let minutes = targetDate.getMinutes() - now.getMinutes();
  let seconds = targetDate.getSeconds() - now.getSeconds();

  if (seconds < 0) { seconds += 60; minutes--; }
  if (minutes < 0) { minutes += 60; hours--; }
  if (hours < 0) { hours += 24; days--; }

  document.getElementById("countdown").innerHTML = `
    ${years > 0 ? `<div class="count-box"><span>${years}</span>Years</div>` : ""}
    <div class="count-box"><span>${months}</span>Months</div>
    <div class="count-box"><span>${days}</span>Days</div>
    <div class="count-box"><span>${hours}</span>Hours</div>
    <div class="count-box"><span>${minutes}</span>Minutes</div>
    <div class="count-box"><span>${seconds}</span>Seconds</div>
  `;
}
setInterval(updateCountdown, 1000);
updateCountdown();

// SLIDER
let i=0;
const slides=document.querySelectorAll(".slide");
setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
  i=(i+1)%slides.length;
},3000);

// MUSIC
const music=document.getElementById('music');
const btn=document.getElementById('musicBtn');

btn.onclick=()=>{
  if(music.paused){
    music.play();
    btn.innerText="⏸";
  } else {
    music.pause();
    btn.innerText="🎵";
  }
};
</script>

</body>
</html>
