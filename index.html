<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  padding: 0;
  background: #FDF5E6;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

/* ❌ FORCE MOBILE ONLY */
html, body {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

/* 🎬 INTRO */
#introScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
}

.intro-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(8px) brightness(0.6);
}

.intro-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

.intro-content {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
}

.intro-name {
  font-family: 'Playfair Display';
  font-size: 2rem;
  color: white;
}
.intro-name span {
  color: #D4AF37;
}

/* 🧧 CORNERS */
.corner {
  position: fixed;
  width: 80px;
  z-index: 5;
}
.top-right { top:0; right:0; }
.bottom-left { bottom:0; left:0; transform: rotate(90deg); }

/* 📱 HERO */
.video-section {
  width: 100%;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #FDF5E6;
}

.video-box {
  position: relative;
  width: 100%;
}

.video-box video {
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
  background: #FDF5E6;
}

/* CONTENT ON VIDEO */
.overlay-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 10px;
}

.name {
  font-family: 'Playfair Display';
  font-size: 2.2rem;
  color: white;
}

.name span {
  color: #D4AF37;
}

.invite-line {
  font-family: 'Cormorant Garamond';
  color: #f3e3a2;
  font-size: 0.9rem;
  margin-top: 8px;
}

/* GANESHA */
.ganesha-center {
  width: 40px;
  margin-bottom: 10px;
}

/* COUNTDOWN */
.count-box {
  color: white;
  font-size: 0.8rem;
  text-align: center;
}
.count-box span {
  color: #D4AF37;
  font-size: 1.2rem;
}

/* JOURNEY */
.section {
  padding: 40px 15px;
  text-align: center;
}

.section h2 {
  font-family: 'Playfair Display';
  color: #D4AF37;
  font-size: 1.5rem;
}

/* SLIDER */
.slider {
  width: 100%;
  height: 200px;
  position: relative;
  margin-top: 15px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0;
  transition: 1s;
}

.slide.active {
  opacity: 1;
}

/* MAP */
.map {
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  margin-top: 10px;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #D4AF37;
  color: white;
  padding: 10px;
  border-radius: 50%;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen">
  <video autoplay muted loop class="intro-video">
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="intro-overlay"></div>

  <div class="intro-content">
    <h1 class="intro-name">Nirbhay <span>&</span> Shalu</h1>
  </div>
</div>

<img src="Top.png" class="corner top-right">
<img src="Bottom.png" class="corner bottom-left">

<!-- MAIN -->
<div id="main" style="display:none;">

<!-- HERO -->
<section class="video-section">

  <div class="video-box">

    <video autoplay muted loop>
      <source src="https://www.w3schools.com/howto/rain.mp4">
    </video>

    <div class="overlay-content">

      <img src="lordganesh.png" class="ganesha-center">

      <h1 class="name">Nirbhay <span>&</span> Partner</h1>

      <p class="invite-line">
        Together with their families, request your presence
      </p>

      <div id="countdown" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;"></div>

    </div>
  </div>

</section>

<!-- JOURNEY -->
<div class="section">
  <h2>Our Journey Continues</h2>

  <div class="slider">
    <img src="https://picsum.photos/400/300?1" class="slide active">
    <img src="https://picsum.photos/400/300?2" class="slide">
    <img src="https://picsum.photos/400/300?3" class="slide">
  </div>
</div>

<!-- MAP -->
<div class="section">
  <h2>Venue</h2>
  <p>Grand Palace, Lucknow</p>

  <div class="map">
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18..."
      width="100%" height="220" style="border:0;">
    </iframe>
  </div>
</div>

</div>

<!-- MUSIC -->
<div id="musicBtn">🎵</div>
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

// intro
window.onload = () => {
  setTimeout(() => {
    document.getElementById("introScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
  }, 2000);
};

// countdown (same logic)
const targetDate = new Date("Nov 30, 2026");

function updateCountdown(){
  const now = new Date();

  let years = targetDate.getFullYear() - now.getFullYear();
  let months = targetDate.getMonth() - now.getMonth();
  let days = targetDate.getDate() - now.getDate();

  if(days < 0){
    months--;
    days += 30;
  }

  if(months < 0){
    years--;
    months += 12;
  }

  document.getElementById("countdown").innerHTML = `
    <div class="count-box"><span>${years}</span>Y</div>
    <div class="count-box"><span>${months}</span>M</div>
    <div class="count-box"><span>${days}</span>D</div>
  `;
}

setInterval(updateCountdown,1000);
updateCountdown();

// slider
let i=0;
const slides=document.querySelectorAll(".slide");
setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
  i=(i+1)%slides.length;
},3000);

// music
const music=document.getElementById("music");
const btn=document.getElementById("musicBtn");

btn.onclick=()=>{
  music.paused ? music.play() : music.pause();
};

</script>

</body>
</html>
