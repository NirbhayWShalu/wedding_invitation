<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin:0; background:#FDF5E6; font-family:'Montserrat'; }

/* FIX GAP */
.header { padding:6px 10px 0; margin:0; }
.video-section { margin:0; padding:0; }

/* GANESHA */
.ganesha-top { display:flex; justify-content:center; padding-top:10px; }
.ganesha-top img { width:55px; }

/* HEADER */
.header h1{margin:0;font-family:'Playfair Display';font-size:1.6rem;}
.header h2{margin:2px 0 0;font-family:'Cormorant Garamond';color:#D4AF37;}

/* HERO */
.video-box video{width:100%;object-fit:contain;background:#FDF5E6;}
.overlay-content{
 position:absolute; inset:0; display:flex; flex-direction:column;
 align-items:center; justify-content:center;
}

/* NAME ANIMATION */
.name{
 font-family:'Playfair Display';
 font-size:2.2rem;
 color:white;
 opacity:0;
 transform:translateY(20px);
 animation:fadeUp 1.2s ease forwards;
}
.name span{color:#D4AF37;}

@keyframes fadeUp{
 to{opacity:1; transform:translateY(0);}
}

/* COUNTDOWN OUTSIDE HERO */
.count-section{
 text-align:center;
 padding:20px 0;
}

.count-wrap{
 display:flex;
 justify-content:center;
 gap:12px;
}

.count-box{
 background:white;
 padding:10px;
 border-radius:10px;
 width:55px;
 box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.count-box span{
 display:block;
 font-size:1.4rem;
 color:#D4AF37;
}

.count-box small{
 font-size:0.7rem;
 color:#333;
}

/* INTRO SCRATCH */
#introScreen{
 position:fixed; inset:0; z-index:9999;
 background:#000;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

.scratch{
 position:relative;
 width:80%;
 height:150px;
 background:#999;
 border-radius:12px;
 overflow:hidden;
}

.reveal{
 position:absolute;
 inset:0;
 display:flex;
 justify-content:center;
 align-items:center;
 color:white;
 font-family:'Playfair Display';
 font-size:1.5rem;
}

canvas{
 position:absolute;
 inset:0;
}
</style>
</head>

<body>

<!-- 🕉️ GANESHA -->
<div class="ganesha-top">
  <img src="lordganesh.png">
</div>

<!-- HEADER -->
<div class="header text-center">
  <h1>Wedding Invitation</h1>
  <h2>शुभ विवाह</h2>
</div>

<!-- 🎬 SCRATCH INTRO -->
<div id="introScreen">
  <div class="scratch">
    <div class="reveal">30 November 2026</div>
    <canvas id="scratchCanvas"></canvas>
  </div>
</div>

<!-- HERO -->
<section class="video-section">
<div class="video-box">

<video autoplay muted loop>
  <source src="https://www.w3schools.com/howto/rain.mp4">
</video>

<div class="overlay-content">
  <h1 class="name">Nirbhay <span>&</span> Shalu</h1>
</div>

</div>
</section>

<!-- COUNTDOWN OUTSIDE -->
<div class="count-section">
<div id="countdown" class="count-wrap"></div>
</div>

<script>

/* SCRATCH EFFECT */
const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");

canvas.width=canvas.offsetWidth;
canvas.height=canvas.offsetHeight;

ctx.fillStyle="#999";
ctx.fillRect(0,0,canvas.width,canvas.height);

let scratching=false;

canvas.addEventListener("mousedown",()=>scratching=true);
canvas.addEventListener("mouseup",()=>scratching=false);
canvas.addEventListener("mousemove",(e)=>{
 if(!scratching) return;
 ctx.globalCompositeOperation="destination-out";
 ctx.beginPath();
 ctx.arc(e.offsetX,e.offsetY,15,0,Math.PI*2);
 ctx.fill();
});

/* AUTO REMOVE INTRO AFTER SCRATCH */
setTimeout(()=>{
 document.getElementById("introScreen").style.display="none";
},3000);

/* COUNTDOWN */
const targetDate=new Date("Nov 30, 2026");

function updateCountdown(){
 const now=new Date();

 let months=(targetDate.getFullYear()-now.getFullYear())*12+(targetDate.getMonth()-now.getMonth());
 let days=targetDate.getDate()-now.getDate();

 if(days<0){months--; days+=30;}

 let hours=targetDate.getHours()-now.getHours();
 let minutes=targetDate.getMinutes()-now.getMinutes();
 let seconds=targetDate.getSeconds()-now.getSeconds();

 if(seconds<0){seconds+=60;minutes--;}
 if(minutes<0){minutes+=60;hours--;}
 if(hours<0){hours+=24;days--;}

 document.getElementById("countdown").innerHTML=`
 <div class="count-box"><span>${months}</span><small>Months</small></div>
 <div class="count-box"><span>${days}</span><small>Days</small></div>
 <div class="count-box"><span>${hours}</span><small>Hours</small></div>
 <div class="count-box"><span>${minutes}</span><small>Min</small></div>
 <div class="count-box"><span>${seconds}</span><small>Sec</small></div>
 `;
}

setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
